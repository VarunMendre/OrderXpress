<script>
        // Micro-interactions for quantity adjustment
        document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
            if (icon.innerText === 'add' || icon.innerText === 'remove') {
                icon.parentElement.addEventListener('click', function() {
                    const countSpan = this.parentElement.querySelector('span:not(.material-symbols-outlined)');
                    let count = parseInt(countSpan.innerText);
                    if (icon.innerText === 'add') {
                        countSpan.innerText = count + 1;
                    } else if (count > 0) {
                        countSpan.innerText = count - 1;
                    }
                    
                    // Simple animation feedback
                    countSpan.classList.add('scale-110');
                    setTimeout(() => {
                        countSpan.classList.remove('scale-110');
                    }, 200);
                });
            }
        });

        // Textarea counter
        const textarea = document.getElementById('instructions');
        const counter = textarea.nextElementSibling;
        textarea.addEventListener('input', (e) => {
            const length = e.target.value.length;
            counter.innerText = `${length} / 200`;
            if (length > 180) counter.classList.add('text-error');
            else counter.classList.remove('text-error');
        });
    </script>
