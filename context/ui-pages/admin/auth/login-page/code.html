<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OrderXpress Admin | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#0B3877",
                    "primary-container": "#0b3877",
                    "on-primary": "#ffffff",
                    "secondary": "#5d5e64",
                    "surface": "#FFFFFF",
                    "background": "#F7F8FA",
                    "on-surface": "#1a1b20",
                    "on-surface-variant": "#434750",
                    "outline-variant": "#EDEEF1",
                    "outline": "#747781",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f4f3f9",
                    "error": "#E5484D",
                    "success": "#358F6C"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "16px",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "gutter": "16px",
                    "sm": "8px",
                    "margin-desktop": "48px",
                    "xs": "4px",
                    "xl": "32px",
                    "lg": "24px",
                    "md": "16px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "title-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F7F8FA;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            box-shadow: 0px 12px 32px rgba(0,0,0,0.04);
        }
        .input-glow:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(11, 56, 119, 0.1);
            border-color: #0B3877;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-gutter">
<!-- Subtle Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[30%] h-[30%] bg-primary/5 rounded-full blur-[80px]"></div>
</div>
<main class="relative w-full max-w-md">
<!-- Brand Header -->
<header class="mb-xl text-center">
<div class="inline-flex items-center justify-center gap-2 mb-sm">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="local_shipping">local_shipping</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold tracking-tight">OrderXpress</h1>
<p class="text-on-surface-variant font-body-sm mt-xs opacity-70">Admin Terminal Management System</p>
</header>
<!-- Login Card -->
<div class="bg-white rounded-xl p-lg md:p-xl login-card border border-outline-variant">
<h2 class="font-title-md text-title-md text-on-surface mb-md">Welcome Back</h2>
<form class="space-y-md" id="loginForm">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full h-[52px] pl-11 pr-md bg-surface-container-low border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-0 input-glow transition-all" id="email" name="email" placeholder="admin@orderxpress.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-primary font-label-md text-label-md hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full h-[52px] pl-11 pr-11 bg-surface-container-low border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-0 input-glow transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm py-xs">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Login Button (Solid Black as requested) -->
<button class="w-full h-[52px] bg-black text-white font-title-md text-title-md rounded-full shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-lg" type="submit">
                    Login
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social/Other Login Options -->
<div class="mt-xl pt-lg border-t border-outline-variant">
<div class="flex items-center justify-center gap-md">
<button class="flex-1 flex items-center justify-center gap-sm h-11 border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-background transition-colors">
<img alt="Google Logo" class="w-4 h-4" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAT7IVvHDjSO0lLn6qbIvRwD87fctmsxOlFMmo9USJrIdXr8dlbGYY5CGIM7htlZREhnxRhqFJ9blpXMlnSX_ujnZ9zkcqzAVaH27OnruReW7A7_1bVpU6N59tYd2QL-qEScu_7nroaZNsK2WTYHTF8FTPF8gTRU7hnOiSSpbDJOA4yzncpGzKZcFeaPhoG3Gfpkvdojv27S_Wp2terR88CwEsTo26JpAV1ERYwompv0nNHArgmEVK_"/>
                        Google
                    </button>
<button class="flex-1 flex items-center justify-center gap-sm h-11 border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-background transition-colors">
<span class="material-symbols-outlined text-on-surface text-lg" data-icon="fingerprint">fingerprint</span>
                        Passkey
                    </button>
</div>
</div>
</div>
<!-- Footer Actions -->
<footer class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have a partner account? 
                <a class="text-primary font-semibold hover:underline ml-xs" href="#">Register</a>
</p>
</footer>
</main>
<!-- Side Decoration -->
<div class="hidden lg:block fixed right-margin-desktop top-1/2 -translate-y-1/2 space-y-md w-72 pointer-events-none">
<div class="bg-white shadow-sm border border-outline-variant rounded-xl p-md translate-x-12 opacity-40">
<div class="flex justify-between items-start mb-sm">
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Today's Revenue</span>
<span class="text-primary text-xs font-bold">+12%</span>
</div>
<p class="text-headline-lg text-primary">$4,820.50</p>
</div>
<div class="bg-white shadow-md border border-outline-variant rounded-xl p-md -translate-x-4 opacity-60">
<div class="flex justify-between items-start mb-sm">
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Active Deliveries</span>
<span class="material-symbols-outlined text-primary" data-icon="package_2">package_2</span>
</div>
<p class="text-headline-lg text-primary">18/20</p>
</div>
<div class="bg-white shadow-lg border border-outline-variant rounded-xl p-md translate-x-8 opacity-40">
<div class="flex justify-between items-start mb-sm">
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Avg. Transit Time</span>
<span class="text-primary text-xs font-bold">-2m</span>
</div>
<p class="text-headline-lg text-primary">14 min</p>
</div>
</div>
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Signing in...
            `;

            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Success';
                btn.classList.replace('bg-black', 'bg-primary');
                
                setTimeout(() => {
                   window.location.reload();
                }, 800);
            }, 1500);
        });

        const togglePassBtn = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        togglePassBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            const icon = togglePassBtn.querySelector('.material-symbols-outlined');
            icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
</body></html>
