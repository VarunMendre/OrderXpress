<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F7F8FA;
        }
        .glass-card {
            background: #FFFFFF;
            border: 1px solid #EDEEF1;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#0b3877",
                        "secondary": "#5d5e64",
                        "on-tertiary-fixed-variant": "#74340b",
                        "surface": "#FFFFFF",
                        "inverse-primary": "#adc6ff",
                        "surface-bright": "#faf9ff",
                        "on-tertiary": "#ffffff",
                        "border": "#EDEEF1",
                        "success": "#358F6C",
                        "warning": "#BA864C",
                        "accent-blue-tint": "#EAF2FF",
                        "on-tertiary-container": "#e68e5e",
                        "background": "#F7F8FA",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#616269",
                        "on-error": "#ffffff",
                        "on-surface": "#1a1b20",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#3a5d9e",
                        "on-secondary-fixed-variant": "#45474c",
                        "tertiary-fixed": "#ffdbcb",
                        "on-secondary-fixed": "#1a1b21",
                        "tertiary-fixed-dim": "#ffb690",
                        "success-container": "#E7F7EF",
                        "primary-fixed-dim": "#adc6ff",
                        "inverse-on-surface": "#f1f0f6",
                        "error-container": "#ffdad6",
                        "outline-variant": "#c4c6d2",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-highest": "#e2e2e8",
                        "surface-container-high": "#e8e7ee",
                        "tertiary": "#421800",
                        "secondary-container": "#dfdfe6",
                        "tertiary-container": "#642800",
                        "text-secondary": "#7A7F8A",
                        "on-primary-fixed": "#001a41",
                        "surface-variant": "#e2e2e8",
                        "inverse-surface": "#2f3035",
                        "surface-container": "#eeedf3",
                        "on-tertiary-fixed": "#341100",
                        "text-primary": "#111318",
                        "error": "#E5484D",
                        "surface-container-low": "#f4f3f9",
                        "secondary-fixed": "#e2e2e9",
                        "on-background": "#1a1b20",
                        "primary": "#002353",
                        "on-primary-fixed-variant": "#1f4584",
                        "on-surface-variant": "#434750",
                        "on-secondary": "#ffffff",
                        "warning-container": "#FDECD9",
                        "on-primary-container": "#82a4e9",
                        "on-error-container": "#93000a",
                        "outline": "#747781",
                        "surface-dim": "#dad9df"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "base": "4px",
                        "gutter": "16px",
                        "sm": "8px",
                        "margin-desktop": "48px",
                        "xs": "4px",
                        "xl": "32px",
                        "lg": "24px",
                        "md": "16px"
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<header class="w-full h-20 flex items-center justify-center px-margin-mobile z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="rocket_launch">rocket_launch</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold tracking-tight">OrderXpress</h1>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile py-lg">
<div class="w-full max-w-md">
<!-- Step Indicator -->
<div class="flex items-center justify-between mb-xl px-2">
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center">
<span class="material-symbols-outlined text-lg" data-icon="check" style="font-variation-settings: 'FILL' 0;">check</span>
</div>
<span class="font-label-md text-label-md text-primary">Details</span>
</div>
<div class="flex-grow h-0.5 bg-primary mx-4 -mt-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center ring-4 ring-primary-container/20">
<span class="font-bold">2</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold">Account</span>
</div>
<div class="flex-grow h-0.5 bg-outline-variant mx-4 -mt-6"></div>
<div class="flex flex-col items-center gap-2 opacity-40">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center border border-outline">
<span class="font-bold">3</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Verify</span>
</div>
</div>
<!-- Form Card -->
<div class="glass-card p-xl rounded-xl shadow-sm">
<div class="mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Security Setup</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Create your administrative credentials to access the OrderXpress terminal.</p>
</div>
<form class="space-y-md" id="registration-form">
<!-- Email Input -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant px-1 uppercase" for="email">Work Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body-lg text-body-lg" id="email" placeholder="admin@orderxpress.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant px-1 uppercase" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body-lg text-body-lg" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eye-icon-password">visibility</span>
</button>
</div>
<div class="px-1 py-1">
<div class="h-1 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full w-0 transition-all duration-500" id="strength-bar"></div>
</div>
<p class="font-label-md text-[10px] mt-1 text-outline-variant" id="strength-text">Strength: Enter password</p>
</div>
</div>
<!-- Confirm Password Input -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant px-1 uppercase" for="confirm_password">Confirm Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock_reset">lock_reset</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body-lg text-body-lg" id="confirm_password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword('confirm_password')" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eye-icon-confirm">visibility</span>
</button>
</div>
</div>
<div class="pt-lg">
<button class="w-full bg-[#111318] text-on-primary py-4 px-lg rounded-full font-title-md text-title-md hover:shadow-lg hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
<span>Complete Registration</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-xl flex items-center justify-center">
<button class="text-on-surface-variant font-label-md text-label-md flex items-center gap-1 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
                    Back to Step 1
                </button>
</div>
</div>
</div>
</main>
<footer class="p-lg text-center opacity-60">
<p class="font-body-sm text-body-sm text-on-surface-variant">© 2024 OrderXpress Terminal. Secure SSL Encryption.</p>
</footer>
<!-- Decorative background element -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/3 blur-[120px] bg-primary/5 rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/4 blur-[100px] bg-secondary/5 rounded-full"></div>
<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        const icon = id === 'password' ? document.getElementById('eye-icon-password') : document.getElementById('eye-icon-confirm');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility';
        }
    }

    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');

    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let strength = 0;
        if (val.length > 6) strength += 20;
        if (val.match(/[A-Z]/)) strength += 20;
        if (val.match(/[0-9]/)) strength += 20;
        if (val.match(/[^A-Za-z0-9]/)) strength += 20;
        if (val.length > 10) strength += 20;

        strengthBar.style.width = strength + '%';
        
        if (strength < 40) {
            strengthBar.className = 'h-full transition-all duration-500 bg-error';
            strengthText.textContent = 'Strength: Weak';
            strengthText.className = 'font-label-md text-[10px] mt-1 text-error';
        } else if (strength < 80) {
            strengthBar.className = 'h-full transition-all duration-500 bg-warning';
            strengthText.textContent = 'Strength: Moderate';
            strengthText.className = 'font-label-md text-[10px] mt-1 text-warning';
        } else {
            strengthBar.className = 'h-full transition-all duration-500 bg-primary';
            strengthText.textContent = 'Strength: Robust';
            strengthText.className = 'font-label-md text-[10px] mt-1 text-primary';
        }
    });

    document.getElementById('registration-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Processing...';
        btn.disabled = true;
        setTimeout(() => {
            alert('Account security verified. Redirecting to final step...');
            window.location.reload();
        }, 1500);
    });
</script>
</body></html>
